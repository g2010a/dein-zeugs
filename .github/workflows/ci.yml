name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install --no-deps -e . && pip install pytest pytest-cov pyyaml jinja2 beautifulsoup4 numpy ruff

      - name: Lint
        run: ruff check

      - name: Test
        run: pytest tests/ -v
